name: Build Android APK & AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build APK and AAB in Cloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Debug Environment Info
        run: |
          echo "=== Node Version ==="
          node -v
          echo "=== NPM Version ==="
          npm -v
          echo "=== Java Version ==="
          java -version

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor Android
        run: |
          npx cap sync android
          echo "=== Check Android Folder Assets ==="
          ls -la android/app/src/main/assets/public || echo "No assets folder found"

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Fix Corrupt Gradle Wrapper
        run: |
          echo "=== Fixing Corrupt Gradle Wrapper ==="
          mkdir -p android/gradle/wrapper
          curl -Lo android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar

      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Android AAB (Release Bundle)
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZoyaAI-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZoyaAI-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab

